<div id="templateContentModal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <div id="templateContent"></div>
    </div>
    <div class="modal-footer">
        <button id="copyToClipboard" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>
</div>

<script>
function copyToClipboard() {
    var content = document.getElementById('templateContent').innerText;
    navigator.clipboard.writeText(content).then(function() {
        alert('Copied to clipboard!');
    });
}

function showModal(content) {
    document.getElementById('templateContent').innerText = content;
    document.getElementById('templateContentModal').style.display = 'block';
}

document.querySelector('.close-button').onclick = function() {
    document.getElementById('templateContentModal').style.display = 'none';
};
